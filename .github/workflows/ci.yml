name: Build for CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-plugin-ci:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install .NET MAUI Workload
      run: dotnet workload restore src\Plugin.Maui.Rive.sln

    - name: Download native dependencies
      shell: bash
      run: ./download-native-deps.sh

    - name: Build
      run: dotnet build src\Plugin.Maui.Rive.sln -c Release
