name: Build Sample App for CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-sample-ci:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install .NET MAUI Workload
      run: dotnet workload restore samples\Plugin.Maui.Rive.Sample.sln

    - name: Download native dependencies
      shell: bash
      run: ./download-native-deps.sh

    - name: Build
      run: dotnet build samples\Plugin.Maui.Rive.Sample.sln -c Release
